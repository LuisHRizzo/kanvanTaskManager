services:
  db:
    image: 'postgres:15-alpine'
    container_name: gestor_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gestor_proyectos_db
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: gestor_backend
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      - NODE_ENV=production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    depends_on:
      - db
    restart: unless-stopped
    labels:
      - "traefik.http.routers.gestor_backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.gestor_backend.rule=PathPrefix(`/socket.io`)"
      - "traefik.http.services.gestor_backend.loadbalancer.server.port=3000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL}
    container_name: gestor_frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.http.services.gestor_frontend.loadbalancer.server.port=80"

volumes:
  pgdata: null
