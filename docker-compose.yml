services:
  db:
    image: 'postgres:15-alpine'
    container_name: gestor_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gestor_proyectos_db
    # ELIMINADO: ports: - '5432:5432' por seguridad
    volumes:
      - 'pgdata:/var/lib/postgresql/data' # Este volumen sí queda, ¡es para no perder los datos!
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: gestor_backend
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - 'DATABASE_URL=postgres://admin:${POSTGRES_PASSWORD}@db:5432/gestor_proyectos_db'
      - 'JWT_SECRET=${JWT_SECRET}'
      - 'JWT_EXPIRES_IN=7d'
      - 'FRONTEND_URL=http://localhost:5173'
      - 'GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}'
      - 'GOOGLE_CALLBACK_URL=http://localhost:3000/api/auth/google/callback'
      - 'VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}'
      - 'VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}'
      - 'VAPID_SUBJECT=mailto:admin@example.com'
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: gestor_frontend
    ports:
      - '5173:5173'
    environment:
      - 'VITE_API_URL=http://localhost:3000/api'
    depends_on:
      - backend
    restart: unless-stopped
    # ESTO ES LO NUEVO: Le dice a Coolify qué puerto usar
    labels:
      - "traefik.http.services.gestor_frontend.loadbalancer.server.port=5173"

volumes:
  pgdata: null
